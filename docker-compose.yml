version: "3.9"

services:

  frontend:
    image: nginx:alpine
    ports: ["8000:80"]
    depends_on: [backend]
    volumes: 
      - ./frontend:/var/www/html


  postgres:
    image: postgres:18.4
    ports: ["5432:5432"]
    environment:
      POSTGRES_PASSWORD: 1234
      POSTGRES_USER: user
      POSTGRES_DB: mydb
    volumes: 
      - ./db:/var/lib/postgresql/data
    healthcheck:
        test: ["CMD-SHELL","pg_isready -U user -d mydb"]
        interval: 5s
        timeout: 5s
        retries: 5



  backend:
    image: golang:1.26
    ports: ["8080:8080"]
    environment:
      DB_HOST: postgres
      DB_NAME: mydb
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: 1234
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    volumes: 
      - ./backend:/app
    command: sh -c "go mod download && go run main.go"
